<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>🌾 FutureFarm</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body{background:#f3f4f7}
    .t-on{border-bottom:3px solid #159745;color:#18a14b}
  </style>
</head>
<body class="font-sans">
  <!-- Header -->
  <header class="bg-gray-900 text-white">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <h1 class="text-xl font-bold">🌾 FutureFarm</h1>
      <nav class="flex gap-6 text-sm">
        <button id="vx_tab_d" class="pb-1 t-on">Dashboard</button>
        <button id="vx_tab_a" class="pb-1">Analysis</button>
      </nav>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-6">
    <!-- Dashboard start here -->
    <section id="vx_sec_d" class="bg-white rounded-xl shadow p-6">
      <h2 class="text-2xl font-semibold mb-4">LSTM Price Prediction</h2>
      <button id="vx_btn_p" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg">Predict Today’s Prices</button>

      <div id="vx_res" class="hidden mt-4 p-4 bg-gray-100 border rounded">
        <p id="vx_min" class="text-green-700 font-semibold"></p>
        <p id="vx_max" class="text-green-700 font-semibold"></p>
      </div>

      <div id="vx_plot_box" class="hidden mt-4">
        <!-- for center the image of ploting-->
        <img id="vx_plot_img" alt="7-Day Forecast" class="block mx-auto rounded shadow-md">
      </div>
    </section>

    <!-- Analysis -->
    <section id="vx_sec_a" class="hidden bg-white rounded-xl shadow p-6 mt-6">
      <h2 class="text-2xl font-semibold mb-4">🌾 Seed Quality Analysis (YOLO)</h2>

      <input id="vx_up" type="file" accept="image/*" class="border p-2 rounded-lg bg-gray-50 w-full">
      <button id="vx_btn_s" class="w-full mt-4 bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg">Analyze Seed</button>

      <div id="vx_prev_box" class="hidden mt-4 text-center">
        <img id="vx_prev_img" width="250" class="inline-block rounded shadow" alt="preview">
      </div>

      <div id="vx_seed_res" class="hidden mt-4 p-4 bg-gray-100 border rounded">
        <p id="vx_seed_out" class="text-lg font-semibold text-gray-900"></p>
      </div>
    </section>
  </main>

  <script>
    // --- tabs (randomized ids & vars) ---
    const q1 = document.getElementById("vx_tab_d"),
          q2 = document.getElementById("vx_tab_a"),
          s1 = document.getElementById("vx_sec_d"),
          s2 = document.getElementById("vx_sec_a");
    const fx = () => { s1.classList.add("hidden"); s2.classList.add("hidden"); q1.classList.remove("t-on"); q2.classList.remove("t-on"); };
    q1.onclick = () => { fx(); s1.classList.remove("hidden"); q1.classList.add("t-on"); };
    q2.onclick = () => { fx(); s2.classList.remove("hidden"); q2.classList.add("t-on"); };

    // --- LSTM Predict ---
    const pb = document.getElementById("vx_btn_p"),
          rBox = document.getElementById("vx_res"),
          pMin = document.getElementById("vx_min"),
          pMax = document.getElementById("vx_max"),
          pBox = document.getElementById("vx_plot_box"),
          pImg = document.getElementById("vx_plot_img");

    pb.onclick = async () => {
      try {
        const a = await fetch("/predict");
        const j = await a.json();
        pMin.textContent = "Predicted Min: ₹" + j.Predicted_Min;
        pMax.textContent = "Predicted Max: ₹" + j.Predicted_Max;
        rBox.classList.remove("hidden");

        const b = await fetch("/plot");
        pImg.src = URL.createObjectURL(await b.blob());
        pBox.classList.remove("hidden");
      } catch (e) { alert("Prediction failed."); }
    };

    // --- YOLO Predict ---
    const up = document.getElementById("vx_up"),
          sb = document.getElementById("vx_btn_s"),
          pvBox = document.getElementById("vx_prev_box"),
          pvImg = document.getElementById("vx_prev_img"),
          sdBox = document.getElementById("vx_seed_res"),
          sdOut = document.getElementById("vx_seed_out");

    sb.onclick = async () => {
      const f = up.files[0];
      if (!f) return alert("Please upload an image.");

      pvBox.classList.remove("hidden");
      pvImg.src = URL.createObjectURL(f);

      const form = new FormData();
      form.append("image", f);

      try {
        const r = await fetch("/predict_seed", { method: "POST", body: form });
        const d = await r.json();
        if (d.error) return alert(d.error);
        sdOut.textContent = `Class: ${d.class} (Confidence: ${(d.confidence * 100).toFixed(2)}%)`;
        sdBox.classList.remove("hidden");
      } catch (e) { alert("Seed analysis failed."); }
    };
  </script>
</body>
</html>
